{{- if .Values.application.env -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fullname" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,pre-rollback
    "helm.sh/hook-weight": "-5"
data:
  {{- range $k, $v := .Values.application.env }}
  {{ $k }}: {{ tpl ($v | quote) $ }}
  {{- end }}
{{- end }}
